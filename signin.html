<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<link rel="stylesheet" href="coffee.css">
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-box{
    background:#fff;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
}
.login-box h2{
    color:#2b1404;
    margin-bottom:20px;
}
.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}
.login-box button{
    width:100%;
    padding:10px;
    background:#2b1404;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.login-box button:hover{
    background:#7a6142;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Sign In</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<br><br>

<a href="coffee.html">⬅ Back to Home</a>

</div>

<script>
function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(email=="admin@gmail.com" && password=="123456"){
alert("Login Successful");
window.location.href="coffee.html";
}
else{
alert("Wrong Email or Password");
}

}
</script>
</body>
</html>
